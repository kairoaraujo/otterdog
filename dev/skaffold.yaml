apiVersion: skaffold/v4beta13
kind: Config
metadata:
  name: otterdog

build:
  artifacts:
    - image: ghcr.io/eclipse-csi/otterdog
      context: .
      docker:
        buildArgs:
          version: '{{cmd "poetry" "version" "-s" }}'
        dockerfile: docker/Dockerfile


profiles:
  # This profile is used for local development without exposing the otterdog service using tailscale
  - name: dev
    deploy:
      helm:
        hooks:
          before:
            - host:
                command: ["sh", "-c", "if [ ! -f ./values.yaml ]; then echo 'Error: Please create the `./dev-values.yaml`'; exit 1; fi"]
          after:
            - host:
                command: ["sh", "-c", "echo 'NOTE: run in another terminal `make tunnel` to access http://otterdog.local; exit 1; fi"]
        releases:
          - name: otterdog
            remoteChart: eclipse-csi/otterdog
            valuesFiles:
              - ./dev/dev-values.yaml
              - ./values.yaml

  # This profile is used for ARM64 users local development without exposing the otterdog service using tailscale
  - name: dev-arm64
    deploy:
      helm:
        hooks:
          before:
            - host:
                command: ["sh", "-c", "if [ ! -f ./values.yaml ]; then echo 'Error: Please create the `./values.yaml`'; exit 1; fi"]
          after:
            - host:
                command: ["sh", "-c", "echo 'NOTE: run in another terminal `make tunnel` to access http://otterdog.local'"]
        releases:
          - name: otterdog
            remoteChart: eclipse-csi/otterdog
            valuesFiles:
              - ./dev/dev-values.yaml
              - ./values.yaml
            setValues:
              # for arm64 users (i.e. macbook pro mX) it is required to use the arm64 image
              mongodb.global.security.allowInsecureImages: true
              mongodb.image.repository: "dlavrenuek/bitnami-mongodb-arm"
              mongodb.image.tag: 8.0.4

  # This profile is used for local development with tailscale
  - name: dev-tunnel
    deploy:
      helm:
        hooks:
          before:
            - host:
                command: ["sh", "-c", "if [ ! -f ./values.yaml ]; then echo 'Error: Please create the `./values.yaml`'; exit 1; fi"]
            - host:
                command: ["sh", "-c", "if [ -z \"$NGROK_AUTHTOKEN\" ]; then echo 'Error: NGROK_AUTHTOKEN is not set'; exit 1; fi"]
            - host:
                command: ["sh", "-c", "if [ -z \"$NGROK_APIKEY\" ]; then echo 'Error: NGROK_APIKEY is not set'; exit 1; fi"]
            - host:
                command: ["sh", "-c", "if [ -z \"$NGROK_DOMAIN\" ]; then echo 'Error: NGROK_DOMAIN is not set'; exit 1; fi"]
        releases:
          - name: ngrok-operator
            remoteChart: ngrok/ngrok-operator
            namespace: ngrok
            createNamespace: true
            setValueTemplates:
              credentials.apiKey: "{{.NGROK_APIKEY}}"
              credentials.authtoken: "{{.NGROK_AUTHTOKEN}}"
          - name: otterdog
            remoteChart: eclipse-csi/otterdog
            valuesFiles:
              - ./dev/dev-values.yaml
              - ./values.yaml
            setValueTemplates:
              ingress.enabled: true
              ingress.className: ngrok
              ingress.hosts[0].host: "{{.NGROK_DOMAIN}}"
              ingress.hosts[0].paths[0].path: /
              ingress.hosts[0].paths[0].pathType: Prefix

  # This profile is used by (ARM64) for local development with tailscale
  - name: dev-tunnel-arm64
    deploy:
      helm:
        hooks:
          before:
            - host:
                command: ["sh", "-c", "if [ ! -f ./values.yaml ]; then echo 'Error: Please create the `./values.yaml`'; exit 1; fi"]
            - host:
                command: ["sh", "-c", "if [ -z \"$NGROK_AUTHTOKEN\" ]; then echo 'Error: NGROK_AUTHTOKEN is not set'; exit 1; fi"]
            - host:
                command: ["sh", "-c", "if [ -z \"$NGROK_APIKEY\" ]; then echo 'Error: NGROK_APIKEY is not set'; exit 1; fi"]
            - host:
                command: ["sh", "-c", "if [ -z \"$NGROK_DOMAIN\" ]; then echo 'Error: NGROK_DOMAIN is not set'; exit 1; fi"]
        releases:
          - name: ngrok-operator
            remoteChart: ngrok/ngrok-operator
            namespace: ngrok
            createNamespace: true
            setValueTemplates:
              credentials.apiKey: "{{.NGROK_APIKEY}}"
              credentials.authtoken: "{{.NGROK_AUTHTOKEN}}"
          - name: otterdog
            remoteChart: eclipse-csi/otterdog
            valuesFiles:
              - ./dev/dev-values.yaml
              - ./values.yaml
            setValueTemplates:
              ingress.enabled: true
              ingress.className: ngrok
              ingress.hosts[0].host: "{{.NGROK_DOMAIN}}"
              ingress.hosts[0].paths[0].path: /
              ingress.hosts[0].paths[0].pathType: Prefix
              # for arm64 users (i.e. macbook pro mX) it is required to use the arm64 image
              mongodb.global.security.allowInsecureImages: true
              mongodb.image.repository: "dlavrenuek/bitnami-mongodb-arm"
              mongodb.image.tag: 8.0.4
