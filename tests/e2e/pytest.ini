[pytest]
# BDD test configuration for nicer visual output

# Default command line options
addopts =
    # Gherkin reporter for BDD scenarios
    --gherkin-terminal-reporter
    # Verbose output to see all steps
    -vv
    # Color output
    --color=yes
    # Show extra test summary info
    -ra
    # Shorter traceback format
    --tb=short
    # Show local variables in tracebacks
    --showlocals

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers for test organization
markers =
    smoke: Quick smoke tests for CI/CD
    happy_path: Tests for normal successful operation
    error_handling: Tests for error scenarios
    idempotency: Tests for idempotent operations
    e2e: End-to-end integration tests
    multiple_orgs: Tests with multiple organizations
    partial_sync: Tests for partial sync scenarios
    github_api_rate_limit: Tests for rate limiting
    config_validation: Tests for configuration validation
    blueprint_application: Tests for blueprint application
    policy_enforcement: Tests for policy enforcement
    incremental_sync: Tests for incremental synchronization

# Disable warnings about unknown marks
filterwarnings =
    ignore::pytest.PytestUnknownMarkWarning
    ignore::DeprecationWarning:gherkin.gherkin_line

# Minimum version
minversion = 7.0

# Test paths
testpaths = tests/e2e

# Coverage settings (if using pytest-cov)
[coverage:run]
source = otterdog
omit =
    */tests/*
    */test_*.py